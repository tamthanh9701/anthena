<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 16px; background: #2c2c2c; color: #e0e0e0; font-size: 13px; }
    h1 { font-size: 16px; margin: 0 0 12px; color: #fff; font-weight: 600; }
    label { display: block; font-size: 11px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    textarea { width: 100%; height: 180px; padding: 8px; border: 1px solid #555; border-radius: 4px; background: #1e1e1e; color: #d4d4d4; font-family: "Cascadia Code", "Fira Code", monospace; font-size: 11px; resize: vertical; }
    textarea:focus { outline: none; border-color: #1677ff; }
    .actions { display: flex; gap: 6px; margin: 10px 0; }
    .actions button { flex: 1; padding: 7px 0; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500; transition: opacity 0.15s; }
    .actions button:disabled { opacity: 0.4; cursor: default; }
    .btn-verify { background: #1668dc; color: #fff; }
    .btn-dryrun { background: #d48806; color: #fff; }
    .btn-apply { background: #1677ff; color: #fff; }
    .status { padding: 8px 12px; border-radius: 4px; margin: 8px 0; font-size: 12px; line-height: 1.4; min-height: 18px; }
    .status.ok { background: #1a3a2a; border: 1px solid #2d8a4e; }
    .status.error { background: #3a1a1a; border: 1px solid #8a2d2d; }
    .status.info { background: #1a2a3a; border: 1px solid #2d5a8a; }
    .status.warn { background: #3a3a1a; border: 1px solid #8a8a2d; }
    .log { font-size: 11px; font-family: "Cascadia Code", "Fira Code", monospace; white-space: pre-wrap; margin-top: 6px; max-height: 200px; overflow-y: auto; padding: 6px; background: #1e1e1e; border-radius: 4px; border: 1px solid #444; }
    .validation { font-size: 11px; color: #e06c75; margin: 4px 0; min-height: 14px; }
    hr { border: none; border-top: 1px solid #444; margin: 10px 0; }
    .footer { font-size: 10px; color: #666; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Anthena Sync</h1>

  <label for="jsonInput">Curated Release JSON</label>
  <textarea id="jsonInput" placeholder='Paste release JSON here, e.g.:
{
  "releaseId": "rel-001",
  "releaseHash": "abc123",
  "releaseUrl": "",
  "tokens": [
    { "tokenName": "colorPrimary", "canonicalValue": "#1890ff", "dataType": "color" }
  ]
}'></textarea>
  <div id="validation" class="validation"></div>

  <div class="actions">
    <button id="btnVerify" class="btn-verify">Verify</button>
    <button id="btnDryRun" class="btn-dryrun">Dry-run</button>
    <button id="btnApply" class="btn-apply">Apply</button>
  </div>

  <div id="status" class="status info">Paste a release JSON and choose an action.</div>
  <div id="log" class="log"></div>
  <hr>
  <div class="footer">Anthena Sync v2.0 &mdash; offline JSON import</div>

  <script>
    var jsonInput = document.getElementById('jsonInput');
    var validationEl = document.getElementById('validation');
    var statusEl = document.getElementById('status');
    var logEl = document.getElementById('log');
    var btnVerify = document.getElementById('btnVerify');
    var btnDryRun = document.getElementById('btnDryRun');
    var btnApply = document.getElementById('btnApply');

    function parseInput() {
      var raw = jsonInput.value.trim();
      if (!raw) {
        validationEl.textContent = '';
        return null;
      }
      try {
        var data = JSON.parse(raw);
        validationEl.textContent = '';
        return data;
      } catch (e) {
        validationEl.textContent = 'JSON parse error: ' + e.message;
        return null;
      }
    }

    function validatePayload(data) {
      if (!data) return 'No data';
      var errs = [];
      if (!data.releaseId || typeof data.releaseId !== 'string') errs.push('releaseId (string) required');
      if (!data.releaseHash || typeof data.releaseHash !== 'string') errs.push('releaseHash (string) required');
      if (!Array.isArray(data.tokens)) errs.push('tokens (array) required');
      if (errs.length === 0 && data.tokens.length === 0) errs.push('tokens array is empty');
      if (errs.length === 0) {
        for (var i = 0; i < data.tokens.length; i++) {
          var t = data.tokens[i];
          if (!t.tokenName || !t.canonicalValue) {
            errs.push('token[' + i + '] missing tokenName or canonicalValue');
          }
        }
      }
      return errs.length > 0 ? errs.join('; ') : null;
    }

    function setButtonsEnabled(enabled) {
      btnVerify.disabled = !enabled;
      btnDryRun.disabled = !enabled;
      btnApply.disabled = !enabled;
    }

    function sendAction(action) {
      var data = parseInput();
      if (!data) return;
      var validationError = validatePayload(data);
      if (validationError) {
        validationEl.textContent = validationError;
        return;
      }
      validationEl.textContent = '';
      setButtonsEnabled(false);
      statusEl.className = 'status info';
      statusEl.textContent = action + ' in progress...';
      logEl.textContent = '';

      parent.postMessage({
        pluginMessage: {
          type: 'run',
          params: {
            releaseId: data.releaseId,
            releaseHash: data.releaseHash,
            releaseUrl: data.releaseUrl || '',
            tokens: data.tokens,
            action: action
          }
        }
      }, '*');
    }

    btnVerify.addEventListener('click', function () { sendAction('verify'); });
    btnDryRun.addEventListener('click', function () { sendAction('dry-run'); });
    btnApply.addEventListener('click', function () { sendAction('apply'); });

    jsonInput.addEventListener('input', function () {
      var data = parseInput();
      if (data) {
        var err = validatePayload(data);
        validationEl.textContent = err || '';
        setButtonsEnabled(!err);
      } else {
        setButtonsEnabled(false);
      }
    });

    window.onmessage = function (event) {
      var raw;
      try {
        raw = JSON.parse(event.data.pluginMessage || event.data);
      } catch (e) {
        return;
      }

      setButtonsEnabled(true);

      if (raw.type === 'ANTHENA_RESULT') {
        logEl.textContent = JSON.stringify(raw, null, 2);

        if (raw.action === 'verify') {
          if (raw.canApply) {
            statusEl.className = 'status ok';
            statusEl.textContent = 'Verify OK: ' + raw.tokenCount + ' tokens, clone ' + raw.cloneId + ' is valid.';
          } else {
            statusEl.className = 'status error';
            statusEl.textContent = 'Verify FAILED: ' + (raw.reason || 'unknown reason');
          }
        } else if (raw.action === 'dry-run') {
          if (raw.canApply) {
            statusEl.className = 'status info';
            var parts = [];
            if (raw.wouldApply > 0) parts.push(raw.wouldApply + ' would change');
            if (raw.wouldBeUnchanged > 0) parts.push(raw.wouldBeUnchanged + ' unchanged');
            if (raw.wouldSkip > 0) parts.push(raw.wouldSkip + ' skipped');
            statusEl.textContent = 'Dry-run: ' + parts.join(', ') + ' (' + raw.tokenCount + ' total)';
          } else {
            statusEl.className = 'status error';
            statusEl.textContent = 'Dry-run CONFLICT: ' + (raw.reason || 'unknown');
          }
        } else if (raw.action === 'apply') {
          if (raw.errors && raw.errors.length > 0) {
            statusEl.className = 'status warn';
            statusEl.textContent = 'Applied ' + raw.applied + ' tokens with ' + raw.errors.length + ' error(s). See log.';
          } else if (raw.applied > 0) {
            statusEl.className = 'status ok';
            statusEl.textContent = 'Applied ' + raw.applied + ' tokens for release ' + raw.releaseId;
          } else if (raw.unchanged > 0) {
            statusEl.className = 'status ok';
            statusEl.textContent = 'No changes \u2014 ' + raw.unchanged + ' tokens already current (idempotent)';
          } else {
            statusEl.className = 'status info';
            statusEl.textContent = 'Apply complete. ' + raw.applied + ' applied, ' + raw.skipped + ' skipped.';
          }
        }
      } else if (raw.type === 'ANTHENA_ERROR') {
        statusEl.className = 'status error';
        statusEl.textContent = raw.error;
        logEl.textContent = raw.error;
      }
    };

    // Notify parent UI is ready
    parent.postMessage({ pluginMessage: { type: 'ready' } }, '*');
  </script>
</body>
</html>
